[app]
overall = { bg = "#0d0d0d" }

[mgr]
cwd = { fg = "#ffffff", bold = true }
find_keyword = { fg = "#ffffff", bg = "#3a3a3a", bold = true }
find_position = { fg = "#e0e0e0", bg = "reset", bold = true }
symlink_target = { fg = "#aaaaaa" }
marker_copied = { fg = "#e0e0e0", bg = "#e0e0e0" }
marker_cut = { fg = "#b0b0b0", bg = "#b0b0b0" }
marker_marked = { fg = "#f5f5f5", bg = "#f5f5f5" }
marker_selected = { fg = "#ffffff", bg = "#ffffff" }
count_copied = { fg = "#0d0d0d", bg = "#e0e0e0" }
count_cut = { fg = "#0d0d0d", bg = "#b0b0b0" }
count_selected = { fg = "#0d0d0d", bg = "#ffffff" }
border_symbol = "│"
border_style = { fg = "#555555" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[tabs]
active = { fg = "#0d0d0d", bg = "#ffffff", bold = true }
inactive = { fg = "#e0e0e0", bg = "#1e1e1e" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#0d0d0d", bg = "#ffffff", bold = true }
normal_alt = { fg = "#e0e0e0", bg = "#1e1e1e" }
select_main = { fg = "#0d0d0d", bg = "#e0e0e0", bold = true }
select_alt = { fg = "#d0d0d0", bg = "#1e1e1e" }
unset_main = { fg = "#0d0d0d", bg = "#c0c0c0", bold = true }
unset_alt = { fg = "#c0c0c0", bg = "#1e1e1e" }

[status]
overall = { fg = "#e0e0e0", bg = "#141414" }
perm_sep = { fg = "#666666" }
perm_type = { fg = "#ffffff" }
perm_read = { fg = "#f0f0f0" }
perm_write = { fg = "#cccccc" }
perm_exec = { fg = "#ffffff" }
progress_label = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#e0e0e0", bg = "#2a2a2a" }
progress_error = { fg = "#ffffff", bg = "#3a3a3a" }

[pick]
border = { fg = "#777777" }
active = { fg = "#ffffff", bold = true }
inactive = { fg = "#cccccc" }

[input]
border = { fg = "#777777" }
title = { fg = "#ffffff", bold = true }
value = { fg = "#e0e0e0" }
selected = { reversed = true }

[cmp]
border = { fg = "#777777" }
active = { fg = "#ffffff", bg = "#2a2a2a", bold = true }
inactive = { fg = "#cccccc" }
icon_file = ""
icon_folder = ""
icon_command = ""

[tasks]
border = { fg = "#777777" }
title = { fg = "#ffffff", bold = true }
hovered = { fg = "#ffffff", bg = "#2a2a2a", bold = true }

[which]
mask = { bg = "#141414" }
cand = { fg = "#ffffff" }
rest = { fg = "#aaaaaa" }
desc = { fg = "#dddddd" }
separator = "  "
separator_style = { fg = "#666666" }

[help]
on = { fg = "#ffffff" }
run = { fg = "#e0e0e0" }
desc = { fg = "#cccccc" }
hovered = { reversed = true, bold = true }
footer = { fg = "#e0e0e0", bg = "#1e1e1e" }
icon_info = ""
icon_warn = ""
icon_error = ""

[spot]
border = { fg = "#777777" }
title = { fg = "#ffffff", bold = true }
tbl_col = { fg = "#ffffff" }
tbl_cell = { fg = "#e0e0e0", bg = "#1e1e1e" }

[notify]
title_info = { fg = "#e8e8e8" }
title_warn = { fg = "#d0d0d0" }
title_error = { fg = "#bbbbbb" }

[confirm]
border = { fg = "#777777" }
title = { fg = "#ffffff", bold = true }
body = { fg = "#e0e0e0" }
list = { fg = "#cccccc" }
btn_yes = { fg = "#0d0d0d", bg = "#ffffff", bold = true }
btn_no = { fg = "#e0e0e0", bg = "#1e1e1e" }
btn_labels = [ "Yes", "No" ]

[filetype]
rules = [
	{ mime = "image/*", fg = "#f0f0f0" },
	{ mime = "{audio,video}/*", fg = "#dddddd" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#cccccc" },
	{ mime = "application/{pdf,doc,rtf}", fg = "#e8e8e8" },
	{ mime = "vfs/{absent,stale}", fg = "#999999" },
	{ url = "*/", fg = "#ffffff", bold = true },
	{ url = "*", fg = "#e0e0e0" },
]

[icon]
dirs = [
	{ name = ".config", text = "", fg = "#f0f0f0" },
	{ name = ".git", text = "", fg = "#e0e0e0" },
	{ name = ".github", text = "", fg = "#e8e8e8" },
