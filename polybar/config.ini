[colors]
background = #282a36
background-alt = #44475a
foreground = #f8f8f2
comment = #6272a4
cyan = #8be9fd
green = #50fa7b
orange = #ffb86c
pink = #ff79c6
purple = #bd93f9
red = #ff5555
yellow = #f1fa8c
transparent = #00000000

primary = ${colors.purple}
secondary = ${colors.background-alt}
alert = ${colors.red}
disabled = ${colors.comment}

;==========================================================

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 20pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true
line-size = 6pt

border-color = #00000000

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.comment}

font-0 = JetBrainsMono Nerd Font:size=13;3

modules-left = xworkspaces xwindow
modules-right = vpn-icon vpn wifi flameshot date shutdown

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

;==========================================================

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

;==========================================================

[module/shutdown]
type = custom/text
content = 󰐥
content-foreground = ${colors.red}
content-padding = 1
click-left = ~/.config/polybar/shutdown.sh

;==========================================================

[module/vpn]
type = custom/script
exec = ~/.config/polybar/vpn-ip.sh
interval = 5

label-foreground = ${colors.green}
label-padding = 1

;==========================================================

[module/wifi]
type = custom/script
exec = ~/.config/polybar/wifi.sh
interval = 5

label-foreground = ${colors.pink}
label-padding = 1

;==========================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.purple}
label-active-foreground = #000000
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

;==========================================================

[module/xwindow]
type = internal/xwindow
label = %title:0:80:...%

;==========================================================
; DATE / TIME
;==========================================================

[module/date]
type = internal/date
interval = 1

date =   %I:%M %p
date-alt =   %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.purple}

;==========================================================
; Flameshot
;==========================================================

[module/flameshot]
type = custom/text
content = 󰄀
content-foreground = ${colors.white}
content-padding = 1
click-left = flameshot gui

;==========================================================


[settings]
screenchange-reload = true
pseudo-transparency = false

;==========================================================

[module/vpn-icon]
type = custom/image
path = /home/black/.config/polybar/icons/vpn.png
scale = 1
format-padding = 1
click-left = nm-connection-editor

; vim:ft=dosini
