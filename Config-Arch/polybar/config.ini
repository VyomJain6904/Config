include-file = $HOME/.config/polybar/colors.ini

[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
pseudo-transparency = false

[bar/main]
monitor =
monitor-fallback =
monitor-strict = false
monitor-exact = true
override-redirect = false
bottom = false
fixed-center = true

width = 100%
height = 24

background = #00000000
foreground = #8e8e93

border-top-size  = 0
border-top-color = ${color.transparent}

padding-left  = 2
padding-right = 2

font-0 = "JetBrainsMono Nerd Font Mono:size=9:antialias=true;3"
font-1 = "JetBrainsMono Nerd Font Mono:style=Bold:size=9:antialias=true;3"
font-2 = "JetBrainsMono Nerd Font Mono:size=14:antialias=true;4"
font-3 = "fontello:size=16;3"

modules-left   = archlogo sp i3
modules-center = date
modules-right  = controlcenter sp tray_transparent

wm-name    = i3
enable-ipc = true
cursor-click  = pointer
cursor-scroll = ns-resize

; ── Spacer ───────────────────────────────────────────────

[module/sp]
type = custom/text
format = "   "
format-foreground = ${color.transparent}
format-background = ${color.transparent}

; ── Tray ─────────────────────────────────────────────────

[module/tray_transparent]
type = internal/tray
format-background = ${color.transparent}
tray-background   = ${color.transparent}
tray-foreground   = #8e8e93
tray-padding  = 2px
tray-spacing  = 2px
tray-size     = 50%

; ────────── Arch logo ────────────────────────────────────

[module/archlogo]
type = custom/text
label = "󰣇"
format-background = ${color.transparent}
format-foreground = #0a84ff
click-left  = rofi -show drun -theme ~/.config/rofi/spotlight.rasi
click-right = ~/.local/bin/powermenu

; ── i3 Workspaces ────────────────────────────────────────

[module/i3]
type = internal/i3
pin-workspaces  = true
show-urgent     = true
strip-wsnumbers = true
index-sort      = true
enable-click    = true
enable-scroll   = true
wrapping-scroll = true
reverse-scroll  = false
ws-icon-default = ""

format = <label-state><label-mode>

label-mode            = " %mode% "
label-mode-background = ${color.transparent}
label-mode-foreground = #8e8e93

; Active — white, subtle underline
label-focused            = "%name%"
label-focused-foreground = #ffffff
label-focused-background = ${color.transparent}
label-focused-underline  = #0a84ff
label-focused-padding    = 1

; Inactive — muted grey
label-unfocused            = "%name%"
label-unfocused-foreground = #48484a
label-unfocused-background = ${color.transparent}
label-unfocused-padding    = 1

label-visible            = "%name%"
label-visible-foreground = #636366
label-visible-background = ${color.transparent}
label-visible-underline  = #636366
label-visible-padding    = 1

label-urgent            = "%name%"
label-urgent-foreground = #ff453a
label-urgent-background = ${color.transparent}
label-urgent-padding    = 1

; ── Date / Time — macOS menubar style ────────────────────

[module/date]
type = internal/date
interval = 1
date     = %a %d %b
time     = %H:%M
date-alt = %A %d %B %Y
time-alt = %H:%M:%S

format            = <label>
format-background = ${color.transparent}
label             = "  %date%  %time%"
label-foreground  = #000000

[module/controlcenter]
type = custom/text
label = "󰕮"
format-foreground = #8e8e93
format-background = ${color.transparent}
click-left = /usr/bin/python3 ~/.config/polybar/scripts/control-center.py
