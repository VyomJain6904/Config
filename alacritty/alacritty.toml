[env]
TERM = "xterm-256color"

[cursor]
style = "Beam"
unfocused_hollow = true

[window]
opacity = 1
decorations = "none"

[window.padding]
x = 8
y = 8

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

# =========================
# Dracula Colors
# =========================
[colors.primary]
background = "#000000"
foreground = "#F8F8F2"

[colors.cursor]
text = "#1B1D27"
cursor = "#F8F8F2"

[colors.selection]
text = "#1B1D27"
background = "#FF79C6"

[colors.normal]
black   = "#14151D"
red     = "#FF5555"
green   = "#50FA7B"
yellow  = "#F1FA8C"
blue    = "#BD93F9"
magenta = "#FF79C6"
cyan    = "#8BE9FD"
white   = "#F8F8F2"

[colors.bright]
black   = "#44475A"
red     = "#FF6E6E"
green   = "#69FF94"
yellow  = "#FFFFA5"
blue    = "#D6ACFF"
magenta = "#FF92DF"
cyan    = "#A4FFFF"
white   = "#FFFFFF"

[[colors.indexed_colors]]
index = 16
color = "#FFB86C"

[[colors.indexed_colors]]
index = 17
color = "#FF5555"

[keyboard]

# Copy
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

# Paste
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

# Close window
[[keyboard.bindings]]
key = "W"
mods = "Control|Shift"
action = "Quit"

# Fullscreen (optional)
[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

# Font size
[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"
