#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.35;

shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

#################################
# Rounded Corners
#################################

corner-radius = 16;
round-borders = 1;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Transparency
#################################

inactive-opacity = 0.9;
active-opacity = 0.95;
frame-opacity = 0.95;

#################################
# Fade Animations
#################################

fading = true;
fade-delta = 5;

fade-in-step = 0.04;
fade-out-step = 0.04;

#################################
# Blur (BEST FOR ROFI)
#################################

blur-method = "dual_kawase";
blur-strength = 12;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

#################################
# Performance
#################################

detect-rounded-corners = true;
detect-client-opacity = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

use-damage = true;
log-level = "warn";
