	{ name = "Pictures", text = "", fg = "#f0f0f0" },
	{ name = "Public", text = "", fg = "#f0f0f0" },
	{ name = "Videos", text = "", fg = "#f0f0f0" },
]
conds = [
	{ if = "orphan", text = "", fg = "#999999" },
	{ if = "link", text = "", fg = "#cccccc" },
