[colors]
background = #000000
background-alt = #24283b
foreground = #c0caf5
comment = #565f89
red = #f7768e
transparent = #00000000

disabled = ${colors.comment}

;==========================================================

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 14pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true
line-size = 4pt

border-color = ${colors.transparent}

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.comment}

font-0 = JetBrainsMono Nerd Font Propo:size=8;3
font-1 = JetBrainsMono Nerd Font Propo:size=10;4
font-2 = JetBrainsMono Nerd Font Mono:size=8;3

;==========================================================

modules-left = arch-logo xworkspaces
modules-center =
modules-right =  volume brightness bluetooth wifi battery date flameshot shutdown

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

;==========================================================
; ARCH LOGO + ROFI
;==========================================================

[module/arch-logo]
type = custom/text
format = <label>
label = 󰣇
label-font = 2
label-foreground = ${colors.foreground}
label-padding = 1
click-left = rofi -show drun -theme ~/.config/rofi/spotlight.rasi

;==========================================================

[module/shutdown]
type = custom/text
format = <label>
label = 󰐥
label-foreground = ${colors.foreground}
label-padding = 1
click-left = ~/.config/polybar/powermenu.sh

;==========================================================
; WIFI
;==========================================================

[module/wifi]
type = custom/script
exec = ~/.config/polybar/scripts/wifi-status
interval = 10
label = %output%
label-font = 2
label-foreground = ${colors.foreground}
click-left = ~/.config/polybar/scripts/wifi &
click-right = ~/.config/polybar/scripts/wifi-cache &

;==========================================================
; BLUETOOTH
;==========================================================

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth-status
interval = 5
label = %output%
label-font = 2
label-foreground = ${colors.foreground}
click-left = ~/.config/polybar/scripts/bluetooth &
click-right = bash -c 'if bluetoothctl show | grep -q "Powered: yes"; then bluetoothctl power off; else bluetoothctl power on; fi'
scroll-up = bluetoothctl power on
scroll-down = bluetoothctl power off

;==========================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.foreground}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.comment}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

;==========================================================
; DATE / TIME
;==========================================================

[module/date]
type = internal/date
interval = 1

date = 󰥔 %I:%M %p
date-alt = 󰥔 %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

;==========================================================
; Flameshot
;==========================================================

[module/flameshot]
type = custom/text
format = <label>
label = 󰄀
label-foreground = ${colors.foreground}
label-padding = 1
click-left = flameshot gui

;==========================================================
; BATTERY
;==========================================================

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

full-at = 98

label-charging = 󰂅 %percentage%%
label-charging-foreground = ${colors.foreground}
label-charging-padding = 1

label-discharging = 󰁾 %percentage%%
label-discharging-foreground = ${colors.foreground}
label-discharging-padding = 1

label-full = 󰁹 %percentage%%
label-full-foreground = ${colors.foreground}
label-full-padding = 1

label-low = 󰂃 %percentage%%
label-low-foreground = ${colors.red}
label-low-padding = 1

;==========================================================
; VOLUME
;==========================================================

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/audio-status
interval = 1
label = %output%
label-foreground = ${colors.foreground}

; Click left → open full audio manager
click-left = ~/.config/polybar/scripts/audio &
; Click right → toggle mute, force instant redraw (run in background to prevent UI lag)
click-right = bash -c "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && polybar-msg action '#volume.exec'" &
; Scroll → volume ±5%, force instant redraw (run in background to prevent UI lag)
scroll-up = bash -c "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && polybar-msg action '#volume.exec'" &
scroll-down = bash -c "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && polybar-msg action '#volume.exec'" &

;==========================================================
; BRIGHTNESS
;==========================================================

[module/brightness]
type = internal/backlight

card = amdgpu_bl0
use-actual-brightness = true
poll-interval = 1
enable-scroll = true
scroll-interval = 10

format = <bar> <label>
label = %percentage%%
label-foreground = ${colors.foreground}
format-background = #000000
format-padding = 1

bar-width = 12
bar-gradient = true
bar-indicator = ▏
bar-indicator-font = 2
bar-fill = ━
bar-fill-font = 2
bar-foreground-0 = #333333
bar-foreground-1 = #555555
bar-foreground-2 = #888888
bar-foreground-3 = #aaaaaa
bar-empty = ━
bar-empty-font = 2
bar-empty-foreground = #222222

[settings]
screenchange-reload = true
pseudo-transparency = false

;==========================================================

; vim:ft=dosini
