	{ name = "Documents", text = "", fg = "#f0f0f0" },
	{ name = "Downloads", text = "", fg = "#f0f0f0" },
	{ name = "Library", text = "", fg = "#f0f0f0" },
	{ name = "Movies", text = "", fg = "#f0f0f0" },
