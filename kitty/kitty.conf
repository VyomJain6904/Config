# Font
font_family JetBrainsMono Nerd Font
font_size 14.0
bold_font JetBrainsMono Nerd Font Bold

# Cursor
cursor_shape beam

# Scrollback
scrollback_lines -1

# Window Padding
window_padding_width 10

# Dracula Theme
background #181818
background_opacity 0.9
foreground #f8f8f2
cursor #f8f8f2
cursor_text_color #282a36
selection_background #44475a
selection_foreground #f8f8f2
url_color #ff79c6
active_tab_background #44475a
active_tab_foreground #f8f8f2
inactive_tab_background #21222c
inactive_tab_foreground #6272a4
wayland_titlebar_color #282a36
macos_titlebar_color #282a36

# Normal colors
color0 #21222c
color1 #ff5555
color2 #50fa7b
color3 #f1fa8c
color4 #bd93f9
color5 #ff79c6
color6 #8be9fd
color7 #f8f8f2

# Bright colors
color8 #6272a4
color9 #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# Keybindings
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+shift+s launch --location=hsplit --cwd=current
map ctrl+shift+d launch --location=vsplit --cwd=current
map ctrl+w close_window
map ctrl+alt+a set_tab_title

# Alt+1-9 sends escape sequences (for tmux/zellij)
map alt+1 combine : send_text normal \x1b1
map alt+2 combine : send_text normal \x1b2
map alt+3 combine : send_text normal \x1b3
map alt+4 combine : send_text normal \x1b4
map alt+5 combine : send_text normal \x1b5
map alt+6 combine : send_text normal \x1b6
map alt+7 combine : send_text normal \x1b7
map alt+8 combine : send_text normal \x1b8
map alt+9 combine : send_text normal \x1b9
map alt+0 combine : send_text normal \x1b0
